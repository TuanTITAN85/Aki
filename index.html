<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Island Pirates - Hải Tặc Đảo</title>
<style>
  /* ===== CSS: căn giữa game và làm nền tối cho dễ chịu mắt ===== */
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b1530;
    overflow: hidden;
    font-family: "Segoe UI", "Comic Sans MS", sans-serif;
    color: white;
  }
  #wrap {
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
  }
  canvas {
    background: #87ceeb;
    image-rendering: pixelated;       /* Giữ nét pixel art */
    image-rendering: crisp-edges;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    border-radius: 6px;
    cursor: crosshair;
  }
</style>

<!-- Firebase compat SDK: tải sẵn để JS chính dùng được biến `firebase` toàn cục -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<!-- Module game đã tách ra (xem CLAUDE.md). Load trước inline script chính. -->
<script src="src/render.js"></script>
<script src="src/audio.js"></script>
<script src="src/leaderboard.js"></script>
<script src="src/orb.js"></script>
<script src="src/bosses.js"></script>
<script src="src/player.js"></script>
<script src="src/enemy.js"></script>
<script src="src/items.js"></script>
<script src="src/levels.js"></script>
<script src="src/world.js"></script>
<script src="src/ui/hud.js"></script>
<script src="src/ui/shop.js"></script>
<script src="src/ui/screens.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1280" height="720"></canvas>
</div>

<!-- Input ẩn để bắt tên hải tặc với hỗ trợ IME tiếng Việt (Telex/VNI/Unikey).
     Đặt off-screen, focus khi vào STATE.NAME_INPUT, blur khi rời. -->
<input id="nameInput" type="text" maxlength="14" autocomplete="off"
       autocapitalize="off" spellcheck="false"
       style="position: fixed; top: -9999px; left: -9999px;
              opacity: 0; pointer-events: none;">

<script>
"use strict";

// ===========================================================================
// ISLAND PIRATES - Game đi cảnh (Platformer) cho học sinh tiểu học
// Tác giả thiết kế: Lâm, 10 tuổi
// Chú thích: tất cả comment đều bằng tiếng Việt cho dễ đọc
// ===========================================================================

// --- Lấy canvas và vẽ ---
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false; // giữ nét pixel

// Input ẩn cho việc nhập tên hải tặc - hỗ trợ IME tiếng Việt (Telex/VNI/Unikey).
// Code chỉ đọc .value mỗi frame ở STATE.NAME_INPUT thay vì tự bắt keydown.
const nameInputEl = document.getElementById("nameInput");

// Kích thước màn hình game
const W = canvas.width;
const H = canvas.height;

// --- Hằng số vật lý ---
const GRAVITY     = 0.55;    // trọng lực kéo nhân vật xuống
const JUMP_POWER  = 13.5;    // lực nhảy
const MOVE_SPEED  = 4.2;     // tốc độ chạy
const FRICTION    = 0.82;    // ma sát mặt đất
const AIR_DRAG    = 0.96;    // cản không khí

// ===========================================================================
// 1) TIỆN ÍCH + 2) PARTICLE + 3) PIXEL ART + sprite Hải tặc -----------------
//    Đã tách ra: src/render.js
//    API toàn cục:
//      Tiện ích: rand, randi, choice, clamp, rectsHit, drawText
//      Particle: particles[], spawnParticles, updateParticles, drawParticles
//      Pixel:    drawPixelSprite, PIRATE_PALETTE,
//                PIRATE_IDLE_1/2, PIRATE_RUN_1/2, PIRATE_JUMP
// ===========================================================================

// ===========================================================================
// 3.5) BẢNG SỨC MẠNH - thay đổi khi ăn trái ác quỷ -------------------------
// ===========================================================================
const POWERS = {
  default: {
    name: "Phép Cơ Bản",
    color: "#a26bff", glow: "#cba9ff",
    dmg: 25, cd: 18, speed: 9, size: 14,
    count: 1, spread: 0
  },
  dragon: {  // Trái Rồng - chậm nhưng cực mạnh
    name: "Trái Rồng",
    color: "#ff4a4a", glow: "#ffb8b8",
    dmg: 60, cd: 28, speed: 9, size: 22,
    count: 1, spread: 0
  },
  flame: {   // Trái Lửa - nhanh, vừa
    name: "Trái Lửa",
    color: "#ff8a3c", glow: "#ffd4a8",
    dmg: 32, cd: 12, speed: 11, size: 16,
    count: 1, spread: 0
  },
  ice: {     // Trái Băng - bắn ra 2 viên
    name: "Trái Băng",
    color: "#9ee0ff", glow: "#dff4ff",
    dmg: 22, cd: 14, speed: 10, size: 14,
    count: 2, spread: 0.18
  },
  thunder: { // Trái Sét - cực mạnh, hơi chậm bắn
    name: "Trái Sét",
    color: "#fff14a", glow: "#ffffb0",
    dmg: 85, cd: 40, speed: 14, size: 20,
    count: 1, spread: 0
  },
  wind: {    // Trái Gió - 3 đạn quạt, rất nhanh
    name: "Trái Gió",
    color: "#aaffd0", glow: "#dfffe8",
    dmg: 16, cd: 8, speed: 12, size: 12,
    count: 3, spread: 0.22
  }
};
const FRUIT_VI_NAMES = {
  dragon: "Trái Rồng", flame: "Trái Lửa", ice: "Trái Băng",
  thunder: "Trái Sét", wind: "Trái Gió"
};
// Thứ tự cố định cho thanh sức mạnh (phím 1..6)
const POWER_ORDER = ["default", "dragon", "flame", "ice", "thunder", "wind"];

// ===========================================================================
// 4) LỚP NHÂN VẬT CHÍNH (Player) -------------------------------------------
//      Đã tách ra: src/player.js — class Player
// ===========================================================================

// ===========================================================================
// 5) ĐẠN PHÉP THUẬT - "Khống Chế Từ Xa" ------------------------------------
//      Đã tách ra: src/orb.js — class MagicOrb
// ===========================================================================

// ===========================================================================
// 6) KẺ THÙ ----------------------------------------------------------------
//      Đã tách ra: src/enemy.js — class Enemy + GUARD_*/BEAST_* sprite
// ===========================================================================

// ===========================================================================
// 7+8+9) VẬT PHẨM + NPC + THUYỀN -------------------------------------------
//      Đã tách ra: src/items.js — class Item, QuestNPC, Boat
// ===========================================================================

// ===========================================================================
// 9.5) BOSS -----------------------------------------------------------------
//      Đã tách ra: src/bosses.js
//      API toàn cục: drawMonkeyKing, drawGiantScorpion, drawYeti,
//        drawFireTiger, drawDarkKing; bossSkill* (5 hàm); BOSS_KINDS
// ===========================================================================

// ===========================================================================
// 10+11+12) ĐẢO + LEVEL BUILDER + NHIỆM VỤ ---------------------------------
//      Đã tách ra: src/levels.js
//      Export: ISLAND_CONFIGS, buildIsland, makeQuestState,
//              updateQuests, allQuestsDone
// ===========================================================================

// ===========================================================================
// 13+14) WORLD + CAMERA -----------------------------------------------------
//      Đã tách ra: src/world.js
//      Export: drawBackground, drawPlatforms, drawDecorations,
//              camera, updateCamera
// ===========================================================================

// ===========================================================================
// 15) ĐIỀU KHIỂN -----------------------------------------------------------
// ===========================================================================
const input = {
  left: false, right: false, up: false, down: false,
  jump: false, mouseDown: false, mouseX: 0, mouseY: 0
};
window.addEventListener("keydown", e => {
  // Khi đang nhập tên: chỉ bắt Enter/Escape ở đây, mọi phím chữ/số/IME để
  // <input id="nameInput"> tự xử lý (hỗ trợ Telex/VNI/Unikey). Code đồng bộ
  // typedName = nameInputEl.value mỗi frame trong update().
  if (typeof gameState !== "undefined" && gameState === STATE.NAME_INPUT) {
    if (e.code === "Enter")  { input.enter = true; e.preventDefault(); return; }
    if (e.code === "Escape") { input.esc = true; return; }
    return;   // chặn không cho phím game chạy lúc đang gõ tên
  }
  if (e.code === "ArrowLeft")  input.left = true;
  if (e.code === "ArrowRight") input.right = true;
  if (e.code === "ArrowUp")    input.up = true;
  if (e.code === "ArrowDown")  input.down = true;
  if (e.code === "Space")      { input.jump = true; e.preventDefault(); }
  if (e.code === "Enter")      input.enter = true;
  if (e.code === "Escape")     input.esc = true;
  if (e.code === "KeyE")       input.shopKey = true;
  // Xuất/Nhập bảng xếp hạng - chỉ ở màn hình Tiêu đề để khỏi nhầm
  if (gameState === STATE.TITLE) {
    if (e.code === "KeyB") exportLeaderboard();
    if (e.code === "KeyL") importLeaderboard();
  }
  // Phím 1-6: chuyển sang sức mạnh tương ứng (chỉ nếu đã sở hữu)
  if (e.code && e.code.startsWith("Digit")) {
    const n = parseInt(e.code.slice(5), 10);
    if (n >= 1 && n <= POWER_ORDER.length && player) {
      const target = POWER_ORDER[n - 1];
      if (player.inventory.includes(target) && player.power !== target) {
        player.power = target;
        showNotice("Sức mạnh: " + POWERS[target].name, 80);
        sfxCoin();
      }
    }
  }
  // Phím Q: xoay vòng qua các sức mạnh đang có
  if (e.code === "KeyQ" && player && player.inventory.length > 1) {
    const cur  = player.inventory.indexOf(player.power);
    const next = (cur + 1) % player.inventory.length;
    player.power = player.inventory[next];
    showNotice("Sức mạnh: " + POWERS[player.power].name, 80);
    sfxCoin();
  }
});
window.addEventListener("keyup", e => {
  if (e.code === "ArrowLeft")  input.left = false;
  if (e.code === "ArrowRight") input.right = false;
  if (e.code === "ArrowUp")    input.up = false;
  if (e.code === "ArrowDown")  input.down = false;
  if (e.code === "Space")      input.jump = false;
  if (e.code === "Enter")      input.enter = false;
  if (e.code === "Escape")     input.esc = false;
  if (e.code === "KeyE")       input.shopKey = false;
});
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  input.mouseX = (e.clientX - rect.left) * (W / rect.width);
  input.mouseY = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener("mousedown", e => {
  if (e.button === 0) input.mouseDown = true;
});
canvas.addEventListener("mouseup", e => {
  if (e.button === 0) input.mouseDown = false;
});
// chặn menu chuột phải
canvas.addEventListener("contextmenu", e => e.preventDefault());

// ===========================================================================
// 16) GAME STATE -----------------------------------------------------------
// ===========================================================================
const STATE = {
  LOADING:    "loading",     // đợi tải hết asset PNG, sau đó tự sang TITLE
  TITLE:      "title",
  NAME_INPUT: "name_input",
  PLAYING:    "playing",
  QUEST:      "quest",
  SHOP:       "shop",
  PAUSED:     "paused",      // user đổi tab/app, đợi Enter để resume
  WIN:        "win",
  GAMEOVER:   "gameover"
};

// State trước khi pause - dùng để resume về đúng chỗ (PLAYING/QUEST/SHOP)
let pausedFromState = null;

// Pause/resume - chỉ áp dụng cho gameplay states (không pause title/gameover/win)
function tryPauseFromTabSwitch() {
  if (gameState === STATE.PLAYING || gameState === STATE.QUEST || gameState === STATE.SHOP) {
    pausedFromState = gameState;
    gameState = STATE.PAUSED;
    stopBGM();
  }
}
function resumeFromPause() {
  gameState = pausedFromState || STATE.PLAYING;
  pausedFromState = null;
  startBGM();
}

// Lắng nghe khi tab bị ẩn (chuyển tab khác) hoặc cửa sổ mất focus (đổi app)
document.addEventListener("visibilitychange", () => {
  if (document.hidden) tryPauseFromTabSwitch();
});
window.addEventListener("blur", () => {
  tryPauseFromTabSwitch();
});

// =====================================================================
// BẢNG XẾP HẠNG -------------------------------------------------------
// Đã tách ra: src/leaderboard.js
// API toàn cục: loadLeaderboard, saveLeaderboard, addScoreToLeaderboard,
//   refreshLeaderboardFromCloud, exportLeaderboard, importLeaderboard
// Trạng thái: cloudStatus, leaderboardCache,
//   typedName, scoreSavedThisRound, lastSavedEntry
// =====================================================================

// =====================================================================
// CỬA HÀNG - đã tách ra: src/ui/shop.js
// Export: SHOP_ITEMS, SHOP_LAYOUT, shopCardRect, buyShopItem,
//         drawShopIcon, drawShop
// =====================================================================
let gameState = STATE.LOADING;     // bắt đầu ở loading, tự sang TITLE khi asset xong
let currentIslandIdx = 0;
let level = null;
let player = null;
let quests = [];
let playerOrbs = [];   // đạn của người chơi
let enemyOrbs = [];    // đạn của boss
let questFlash = 0;    // hiệu ứng nhấp nháy khi nhận / hoàn thành nhiệm vụ
let questNotice = "";  // chữ thông báo nhiệm vụ ở giữa màn hình
let noticeTimer = 0;
let mouseClickConsumed = false;

function startGame() {
  ensureAudio();              // tạo AudioContext sau khi user nhấn phím
  currentIslandIdx = 0;
  player = new Player(100, 400);
  player.name = (typedName.trim() || "Hải Tặc").slice(0, 14);
  scoreSavedThisRound = false;
  lastSavedEntry = null;
  loadIsland(0);
  gameState = STATE.PLAYING;
  startBGM();
}

function loadIsland(idx) {
  level = buildIsland(idx);
  quests = makeQuestState(idx);
  player.x = level.spawnX;
  player.y = level.spawnY;
  player.vx = 0; player.vy = 0;
  player.hp = player.maxHp;
  playerOrbs.length = 0;
  enemyOrbs.length = 0;
  particles.length = 0;
  showNotice("Chào mừng đến " + level.name + "! Đến gặp người dân (chấm than vàng) để nhận nhiệm vụ.");
}

function showNotice(msg, time = 240) {
  questNotice = msg;
  noticeTimer = time;
}

// ===========================================================================
// 17) VÒNG LẶP CHÍNH -------------------------------------------------------
// ===========================================================================
function update() {
  if (gameState === STATE.PLAYING) {
    player.update(input, level);

    // Nhân vật chính bắn đạn ma thuật khi click chuột
    if (input.mouseDown && !mouseClickConsumed && player.attackCooldown <= 0) {
      const tx = input.mouseX + camera.x;
      const ty = input.mouseY + camera.y;
      const cfg = POWERS[player.power] || POWERS.default;
      const ox = player.x + player.w/2 - cfg.size/2;
      const oy = player.y + player.h/2 - cfg.size/2;
      let dx = tx - (player.x + player.w/2);
      let dy = ty - (player.y + player.h/2);
      const baseAng = Math.atan2(dy, dx);
      // Bắn count đạn lệch theo spread
      const n = cfg.count || 1;
      const swordMul = player.swordMultiplier();
      for (let i = 0; i < n; i++) {
        const offset = (n === 1) ? 0 : ((i - (n - 1) / 2) * cfg.spread);
        const a = baseAng + offset;
        const orb = new MagicOrb(
          ox, oy,
          Math.cos(a), Math.sin(a),
          "player", cfg
        );
        orb.dmg = cfg.dmg * swordMul;     // kiếm tăng sát thương
        playerOrbs.push(orb);
      }
      player.attackCooldown = cfg.cd;
      sfxShoot();
      // hiệu ứng phép thuật quanh người
      spawnParticles(player.x + player.w/2, player.y + player.h/2, {
        count: 8, color: cfg.glow, speed: 3, size: 3, life: 18, gravity: 0
      });
      mouseClickConsumed = true;
    }
    if (!input.mouseDown) mouseClickConsumed = false;

    // Cập nhật kẻ thù
    for (const e of level.enemies) e.update(level, player);
    // Vật phẩm
    const beforeCoins  = level.items.filter(i => i.kind === "coin"  && i.alive).length;
    const beforeFruits = level.items.filter(i => i.kind === "fruit" && i.alive).length;
    for (const it of level.items) it.update(player);
    const afterCoins   = level.items.filter(i => i.kind === "coin"  && i.alive).length;
    const afterFruits  = level.items.filter(i => i.kind === "fruit" && i.alive).length;
    for (let k = 0; k < beforeCoins  - afterCoins;  k++) updateQuests(quests, "collect_coin");
    for (let k = 0; k < beforeFruits - afterFruits; k++) updateQuests(quests, "collect_fruit");

    // NPC
    for (const n of level.npcs) n.update();
    // Thuyền
    for (const b of level.boats) b.update();

    // Đạn của người chơi
    for (let i = playerOrbs.length - 1; i >= 0; i--) {
      const o = playerOrbs[i];
      o.update();
      let hit = false;
      for (const e of level.enemies) {
        if (e.alive && rectsHit(o, e)) {
          e.takeDamage(o.dmg);
          if (e.alive) sfxHitEnemy();   // còn sống -> tiếng "trúng đòn"; chết thì sfxKillEnemy ở vòng quét sau
          hit = true;
          break;
        }
      }
      if (hit || o.life <= 0) playerOrbs.splice(i, 1);
    }

    // Quét tất cả kẻ thù: nếu vừa chết (do đạn hoặc rơi biển) mà chưa thưởng -> thưởng và đếm nhiệm vụ
    for (const e of level.enemies) {
      if (!e.alive && !e.rewarded) {
        e.rewarded = true;
        player.score += e.scoreReward;
        player.gold  += e.goldReward;
        sfxKillEnemy();
        if (e.kind === "guard")      updateQuests(quests, "kill_guard");
        else if (e.kind === "beast") updateQuests(quests, "kill_beast");
        else if (e.kind === "boss")  updateQuests(quests, "kill_boss");
      }
    }

    // Đạn của boss
    for (let i = enemyOrbs.length - 1; i >= 0; i--) {
      const o = enemyOrbs[i];
      o.update();
      if (rectsHit(o, player)) {
        player.takeDamage(o.dmg);
        enemyOrbs.splice(i, 1);
        continue;
      }
      if (o.life <= 0) enemyOrbs.splice(i, 1);
    }

    // Mở bảng nhiệm vụ khi gần NPC và bấm Enter
    for (const n of level.npcs) {
      if (n.inRange(player) && input.enter) {
        gameState = STATE.QUEST;
        input.enter = false;
        break;
      }
    }

    // Bấm E để mở cửa hàng (mua bằng vàng)
    if (input.shopKey) {
      gameState = STATE.SHOP;
      input.shopKey = false;
      mouseClickConsumed = true;   // tránh bắn tiếp khi mở shop
    }

    // Đến thuyền và đã hoàn thành tất cả nhiệm vụ -> qua đảo mới
    for (const b of level.boats) {
      if (b.inRange(player) && allQuestsDone(quests)) {
        if (currentIslandIdx === ISLAND_CONFIGS.length - 1) {
          gameState = STATE.WIN;
          stopBGM();
          sfxWin();
          commitScore(true);
        } else {
          currentIslandIdx++;
          loadIsland(currentIslandIdx);
          player.score += 1000;
          sfxWin();
        }
        break;
      } else if (b.inRange(player) && !allQuestsDone(quests)) {
        showNotice("Hãy hoàn thành tất cả nhiệm vụ trước khi lên thuyền!", 90);
      }
    }

    // Thua game
    if (player.dead) {
      gameState = STATE.GAMEOVER;
      stopBGM();
      sfxGameOver();
      commitScore(false);
    }

    updateParticles();
    updateCamera(player, level);

    if (noticeTimer > 0) noticeTimer--;
  } else if (gameState === STATE.QUEST) {
    if (input.enter || input.esc) {
      gameState = STATE.PLAYING;
      input.enter = false;
      input.esc = false;
    }
  } else if (gameState === STATE.SHOP) {
    // Đóng cửa hàng bằng E hoặc ESC
    if (input.shopKey || input.esc) {
      gameState = STATE.PLAYING;
      input.shopKey = false;
      input.esc = false;
      mouseClickConsumed = true;
    }
    // Bắt click chuột vào card để mua
    if (input.mouseDown && !mouseClickConsumed) {
      mouseClickConsumed = true;
      for (let i = 0; i < SHOP_ITEMS.length; i++) {
        const r = shopCardRect(i);
        if (input.mouseX >= r.x && input.mouseX <= r.x + r.w &&
            input.mouseY >= r.y && input.mouseY <= r.y + r.h) {
          buyShopItem(SHOP_ITEMS[i]);
          break;
        }
      }
    }
    if (!input.mouseDown) mouseClickConsumed = false;
    // vẫn cập nhật hạt + thông báo cho không bị đứng hình
    updateParticles();
    if (noticeTimer > 0) noticeTimer--;
  } else if (gameState === STATE.LOADING) {
    // Tự chuyển sang TITLE khi tất cả asset đã tải xong (kể cả lỗi - sẽ fallback)
    if (AssetLoader.isReady()) {
      gameState = STATE.TITLE;
    }
  } else if (gameState === STATE.TITLE) {
    if (input.enter) {
      input.enter = false;
      // Bắt đầu nhập tên - focus input ẩn để IME tiếng Việt hoạt động
      ensureAudio();
      typedName = (player && player.name && player.name !== "Hải Tặc") ? player.name : "";
      nameInputEl.value = typedName;
      gameState = STATE.NAME_INPUT;
      // Cho phép input nhận focus tạm thời
      nameInputEl.style.pointerEvents = "auto";
      // Focus sau micro-task để đảm bảo state đã đổi
      Promise.resolve().then(() => nameInputEl.focus());
    }
  } else if (gameState === STATE.NAME_INPUT) {
    // Đồng bộ giá trị từ <input> sang typedName mỗi frame.
    // <input> là source of truth - IME tiếng Việt (Telex/VNI/Unikey) tự xử lý.
    typedName = nameInputEl.value.slice(0, 14);
    // Auto-refocus nếu user click ra ngoài
    if (document.activeElement !== nameInputEl) {
      nameInputEl.focus();
    }
    if (input.esc) {
      input.esc = false;
      gameState = STATE.TITLE;
      nameInputEl.blur();
      nameInputEl.style.pointerEvents = "none";
    }
    if (input.enter) {
      input.enter = false;
      if (typedName.trim().length === 0) {
        showNotice("Vui lòng nhập tên hải tặc của bạn!", 90);
      } else {
        nameInputEl.blur();
        nameInputEl.style.pointerEvents = "none";
        startGame();
      }
    }
    if (noticeTimer > 0) noticeTimer--;
  } else if (gameState === STATE.PAUSED) {
    // Đợi user bấm Enter để tiếp tục chơi
    if (input.enter) {
      input.enter = false;
      resumeFromPause();
    }
  } else if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) {
    if (input.enter) {
      input.enter = false;
      gameState = STATE.TITLE;
    }
  }
}

// Lưu điểm hiện tại của người chơi vào bảng xếp hạng (chỉ 1 lần / lượt)
function commitScore(won) {
  if (scoreSavedThisRound) return;
  scoreSavedThisRound = true;
  const islandsCleared = won ? ISLAND_CONFIGS.length : currentIslandIdx;
  const result = addScoreToLeaderboard(player.name, player.score, islandsCleared, won);
  lastSavedEntry = result.entry;
}

// ===========================================================================
// 18) HÀM VẼ ---------------------------------------------------------------
// ===========================================================================
function draw() {
  // xoá nền
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  if (gameState === STATE.LOADING) {
    drawLoadingScreen();
    return;
  }
  if (gameState === STATE.PAUSED) {
    drawPauseScreen();
    return;
  }
  if (gameState === STATE.TITLE) {
    drawTitleScreen();
    return;
  }
  if (gameState === STATE.NAME_INPUT) {
    drawNameInput();
    return;
  }

  // === Đang chơi / mở bảng nhiệm vụ (vẽ thế giới phía sau) ===
  drawBackground(level, camera.x);
  drawDecorations(level, camera.x, camera.y);
  drawPlatforms(level, camera.x, camera.y);

  // Thuyền cuối đảo
  for (const b of level.boats) b.draw(camera.x, camera.y);
  // NPC
  for (const n of level.npcs) n.draw(camera.x, camera.y);
  // Vật phẩm
  for (const it of level.items) it.draw(camera.x, camera.y);
  // Kẻ thù
  for (const e of level.enemies) e.draw(camera.x, camera.y);
  // Đạn của người chơi
  for (const o of playerOrbs) o.draw(camera.x, camera.y);
  // Đạn của boss
  for (const o of enemyOrbs)  o.draw(camera.x, camera.y);
  // Người chơi
  player.draw(camera.x, camera.y);
  // Hạt
  drawParticles(camera.x, camera.y);

  // Vẽ ngắm chuột
  drawCrosshair();

  // Vẽ UI
  drawPowerBar();
  drawHUD();

  // Thông báo gần NPC
  for (const n of level.npcs) {
    if (n.inRange(player)) {
      const tx = n.x - camera.x + n.w/2;
      const ty = n.y - camera.y - 40;
      drawText("[Enter] Nhận nhiệm vụ", tx, ty, 18, "#fff", "#000", "center");
    }
  }
  // Thông báo gần thuyền
  for (const b of level.boats) {
    if (b.inRange(player)) {
      const tx = b.x - camera.x + b.w/2;
      const ty = b.y - camera.y - 60;
      if (allQuestsDone(quests)) {
        drawText("Lên thuyền sang đảo mới!", tx, ty, 18, "#7afc6e", "#000", "center");
      } else {
        drawText("Cần hoàn thành nhiệm vụ", tx, ty, 18, "#ffd24a", "#000", "center");
      }
    }
  }

  // Thông báo lớn giữa màn hình - đặt dưới boss bar và rộng theo nội dung
  if (noticeTimer > 0 && questNotice) {
    ctx.globalAlpha = Math.min(1, noticeTimer / 30);
    let ns = 22;
    ctx.font = `bold ${ns}px sans-serif`;
    let tw = ctx.measureText(questNotice).width;
    // nếu quá rộng, giảm cỡ chữ
    while (tw > W - 120 && ns > 14) {
      ns--;
      ctx.font = `bold ${ns}px sans-serif`;
      tw = ctx.measureText(questNotice).width;
    }
    const padX = 30, padY = 18;
    const boxW = Math.min(W - 60, tw + padX * 2);
    const boxH = ns + padY * 2;
    const noticeY = 380;
    // pill phẳng, vạch nhấn vàng dưới đáy
    ctx.fillStyle = "rgba(14, 22, 48, 0.92)";
    ctx.fillRect(W/2 - boxW/2, noticeY, boxW, boxH);
    ctx.fillStyle = "#ffd24a";
    ctx.fillRect(W/2 - boxW/2, noticeY + boxH - 3, boxW, 3);
    drawText(questNotice, W/2, noticeY + padY, ns, "#fff", "#000", "center");
    ctx.globalAlpha = 1;
  }

  if (gameState === STATE.QUEST)    drawQuestPanel();
  if (gameState === STATE.SHOP)     drawShop();
  if (gameState === STATE.GAMEOVER) drawGameOver();
  if (gameState === STATE.WIN)      drawWin();
}

// =====================================================================
// Vẽ icon trong cửa hàng tuỳ theo loại mặt hàng
// =====================================================================



// ===========================================================================
// 19) VÒNG LẶP GAME --------------------------------------------------------
// ===========================================================================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

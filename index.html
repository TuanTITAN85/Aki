class MagicOrb {
  constructor(x, y, dirX, dirY, owner = "player", cfg = null) {
    // Cho phép truyền VECTOR hướng (đã chuẩn hóa hoặc không) thay vì tọa độ đích.
    // Nếu cfg null thì dùng cấu hình mặc định / cấu hình của boss
    this.x = x; this.y = y;
    this.cfg = cfg || (owner === "player" ? POWERS.default : {
      color: "#ff5050", glow: "#ffb0b0",
      dmg: 14, speed: 7, size: 16, cd: 0, name: "Boss"
    });
    this.size = this.cfg.size || 14;
    this.w = this.size; this.h = this.size;
    const d = Math.hypot(dirX, dirY) || 1;
    const sp = this.cfg.speed || 9;
    this.vx = (dirX / d) * sp;
    this.vy = (dirY / d) * sp;
    this.life = 80;
    this.owner = owner;
    this.dmg = this.cfg.dmg;
    this.gravity = this.cfg.gravity || 0;     // dùng cho đạn parabol (chuối, v.v.)
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.life--;
    // Vệt sáng phía sau
    spawnParticles(this.x + this.size/2, this.y + this.size/2, {
      count: 1, color: this.cfg.color, speed: 0.4, size: 3, life: 18, gravity: 0
    });
  }
  draw(camX, camY) {
    const cx = this.x - camX + this.size/2, cy = this.y - camY + this.size/2;
    // hào quang ngoài
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = this.cfg.glow;
    ctx.beginPath(); ctx.arc(cx, cy, this.size * 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = this.cfg.color;
    ctx.beginPath(); ctx.arc(cx, cy, this.size * 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(cx, cy, this.size * 0.18, 0, Math.PI * 2); ctx.fill();
  }
}

function buildIsland(index) {
  const cfg = ISLAND_CONFIGS[index];
  const level = {
    name: cfg.name,
    config: cfg,
    width: 4200,
    groundY: 560,
    deathY: 900,
    spawnX: 100,
    spawnY: 400,
    platforms: [],
    enemies: [],
    items: [],
    npcs: [],
    boats: [],
    decorations: []
  };

  // Nền chính
  level.platforms.push({ x: 0, y: 560, w: 1200, h: 200, type: "ground" });
  level.platforms.push({ x: 1280, y: 560, w: 900, h: 200, type: "ground" });
  level.platforms.push({ x: 2260, y: 560, w: 800, h: 200, type: "ground" });
  level.platforms.push({ x: 3140, y: 560, w: 1060, h: 200, type: "ground" });

  // Các bục lơ lửng
  const floats = [
    { x: 320, y: 460, w: 140, h: 24 },
    { x: 540, y: 380, w: 140, h: 24 },
    { x: 760, y: 320, w: 120, h: 24 },
    { x: 1100, y: 420, w: 180, h: 24 },
    { x: 1450, y: 360, w: 160, h: 24 },
    { x: 1700, y: 280, w: 140, h: 24 },
    { x: 2000, y: 380, w: 160, h: 24 },
    { x: 2400, y: 320, w: 140, h: 24 },
    { x: 2620, y: 420, w: 140, h: 24 },
    { x: 2900, y: 350, w: 160, h: 24 },
    { x: 3200, y: 440, w: 140, h: 24 },
    { x: 3450, y: 360, w: 160, h: 24 },
    { x: 3700, y: 300, w: 140, h: 24 }
  ];
  for (const f of floats) {
    level.platforms.push({ ...f, type: "float" });
  }

  // NPC giao nhiệm vụ ngay đầu đảo
  level.npcs.push(new QuestNPC(180, 512, index));

  // Sinh 5 lính canh rải đều khắp đảo
  const guardSpots = [600, 1300, 2050, 2700, 3500];
  for (const gx of guardSpots) {
    const e = new Enemy(gx, 500, {
      kind: "guard",
      hp: 70 + index * 30,        // dày máu hơn nhiều
      dmg: 14 + index * 5,        // gây sát thương cao hơn
      scoreReward: 60 + index * 20,
      goldReward: 6 + index * 2
    });
    level.enemies.push(e);
  }

  // Sinh 5 thú rừng - nhanh và hung dữ
  const beastSpots = [400, 980, 1600, 2300, 3300];
  for (let i = 0; i < beastSpots.length; i++) {
    const e = new Enemy(beastSpots[i], 500, {
      kind: "beast",
      theme: cfg.beastThemes[i % cfg.beastThemes.length],
      hp: 55 + index * 25,
      dmg: 12 + index * 4,
      w: 42, h: 42,
      scoreReward: 50 + index * 15,
      goldReward: 5 + index * 2
    });
    level.enemies.push(e);
  }

  // Sinh boss ở cuối đảo - mỗi đảo 1 boss khác nhau (xem BOSS_KINDS)
  const bk = BOSS_KINDS[cfg.bossKind] || {};
  const bossW = bk.w || 80, bossH = bk.h || 100;
  const boss = new Enemy(3850, 560 - bossH, {
    kind: "boss",
    boss: true,
    bossKind: cfg.bossKind,
    bossName: cfg.bossName,
    hp:  Math.round((450 + index * 200) * (bk.hpMul  || 1)),
    dmg: Math.round((24  + index * 7)   * (bk.dmgMul || 1)),
    w: bossW, h: bossH,
    scoreReward: 500 + index * 200,
    goldReward: 50 + index * 25
  });
  level.enemies.push(boss);
  level.boss = boss;

  // Tiền vàng - rải nhiều khắp đảo (>= 10)

    [350, 420], [380, 420], [410, 420],
    [580, 340], [610, 340], [640, 340],

    [1140, 380], [1180, 380], [1220, 380],
    [1490, 320], [1520, 320],
    [1740, 240], [1770, 240], [1800, 240],
    [2050, 340], [2080, 340],
    [2440, 280], [2470, 280],
    [2660, 380], [2940, 310], [2970, 310],
    [3240, 400], [3270, 400], [3490, 320], [3740, 260]
  ];
  for (const [cx, cy] of coinSpots) {
    level.items.push(new Item(cx, cy, "coin"));
  }

  // Trái ma thuật - ít, quý
  level.items.push(new Item(1750, 240, "fruit"));
  level.items.push(new Item(2950, 310, "fruit"));

  level.boats.push(new Boat(4050, 540));

  // Cây/đá trang trí

      x: 60 + i * 165 + rand(-30, 30),
      y: 560,
      kind: cfg.decoration,
      size: rand(0.8, 1.2)
    });
  }

  return level;

function makeQuestState(islandIdx) {
  const cfg = ISLAND_CONFIGS[islandIdx];
  return cfg.quests.map(q => ({
    type: q.type,
    text: q.text,
    target: q.count,
    progress: 0,
    done: false
  }));
}

function updateQuests(quests, event) {
  // event = { type: "kill_guard" | "kill_beast" | "kill_boss" | "collect_coin" | "collect_fruit" }
  for (const q of quests) {
    if (q.done) continue;
    let inc = 0;
    if (q.type === "kill_guards"   && event === "kill_guard")    inc = 1;
    if (q.type === "kill_beasts"   && event === "kill_beast")    inc = 1;
    if (q.type === "kill_boss"     && event === "kill_boss")     inc = 1;
    if (q.type === "collect_coins" && event === "collect_coin")  inc = 1;
    if (q.type === "collect_fruit" && event === "collect_fruit") inc = 1;
    if (inc) {
      q.progress = Math.min(q.target, q.progress + inc);
      if (q.progress >= q.target) q.done = true;
    }
  }
}
function allQuestsDone(quests) {
  return quests.every(q => q.done);
}

function drawBackground(level, camX) {
  const cfg = level.config;
  // bầu trời gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, cfg.skyTop);
  g.addColorStop(1, cfg.skyBot);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // mặt trời / mặt trăng
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.beginPath(); ctx.arc(W - 160, 120, 60, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#fff5a0";
  ctx.beginPath(); ctx.arc(W - 160, 120, 44, 0, Math.PI * 2); ctx.fill();

  // mây trôi (parallax)
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 320 - camX * 0.2) % (W + 200) + (W + 200)) % (W + 200) - 100;
    const cy = 80 + (i % 3) * 50;
    ctx.beginPath();
    ctx.arc(cx, cy, 28, 0, Math.PI * 2);
    ctx.arc(cx + 24, cy + 4, 22, 0, Math.PI * 2);
    ctx.arc(cx - 24, cy + 6, 20, 0, Math.PI * 2);
    ctx.fill();
  }

  // núi xa (parallax)
  ctx.fillStyle = cfg.groundBot;
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 10; i++) {
    const mx = ((i * 380 - camX * 0.4) % (W + 400) + (W + 400)) % (W + 400) - 200;
    const my = 380;
    ctx.beginPath();
    ctx.moveTo(mx, my + 200);
    ctx.lineTo(mx + 180, my);
    ctx.lineTo(mx + 360, my + 200);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // biển ở dưới cùng
  ctx.fillStyle = cfg.waterColor;
  ctx.fillRect(0, 660, W, H - 660);
  // sóng
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  for (let i = 0; i < 30; i++) {
    const wx = ((i * 60 - camX * 0.6) % (W + 60) + (W + 60)) % (W + 60);
    ctx.fillRect(wx, 670 + (i % 3) * 8, 30, 3);
  }
}

function drawPlatforms(level, camX, camY) {
  const cfg = level.config;
  for (const p of level.platforms) {
    const px = p.x - camX, py = p.y - camY;
    if (px + p.w < -50 || px > W + 50) continue; // ngoài màn hình thì bỏ qua
    if (p.type === "ground") {
      // đất chính
      ctx.fillStyle = cfg.groundTop;
      ctx.fillRect(px, py, p.w, 12);
      ctx.fillStyle = cfg.sandTop;
      ctx.fillRect(px, py + 12, p.w, 8);
      ctx.fillStyle = cfg.groundBot;
      ctx.fillRect(px, py + 20, p.w, p.h - 20);
      // chấm nhỏ trang trí
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      for (let i = 0; i < p.w; i += 24) {
        ctx.fillRect(px + i + 6, py + 30, 3, 3);
        ctx.fillRect(px + i + 14, py + 60, 3, 3);
      }
    } else {
      // bục lơ lửng
      ctx.fillStyle = cfg.groundBot;
      ctx.fillRect(px, py + 4, p.w, p.h);
      ctx.fillStyle = cfg.groundTop;
      ctx.fillRect(px, py, p.w, 8);
      ctx.fillStyle = cfg.sandTop;
      ctx.fillRect(px, py + 8, p.w, 4);
    }
  }
}

function drawDecorations(level, camX, camY) {
  for (const d of level.decorations) {
    const px = d.x - camX, py = d.y - camY;
    if (px < -100 || px > W + 100) continue;
    const s = d.size;
    if (d.kind === "tree") {
      // cây dừa / cây xanh đơn giản
      ctx.fillStyle = "#5a3a1a";
      ctx.fillRect(px - 4 * s, py - 70 * s, 8 * s, 70 * s);
      ctx.fillStyle = "#3a8a2a";
      ctx.beginPath(); ctx.arc(px, py - 70 * s, 28 * s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#6ec85a";
      ctx.beginPath(); ctx.arc(px - 8, py - 76 * s, 18 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + 12, py - 72 * s, 16 * s, 0, Math.PI * 2); ctx.fill();
    } else if (d.kind === "cactus") {
      ctx.fillStyle = "#2a8a4a";
      ctx.fillRect(px - 6, py - 56, 12, 56);
      ctx.fillRect(px - 18, py - 38, 6, 22);
      ctx.fillRect(px + 12, py - 46, 6, 26);
    } else if (d.kind === "pine") {
      ctx.fillStyle = "#5a3a1a";
      ctx.fillRect(px - 4, py - 20, 8, 20);
      ctx.fillStyle = "#1a5a2a";
      ctx.beginPath();
      ctx.moveTo(px, py - 90);
      ctx.lineTo(px + 28, py - 20);
      ctx.lineTo(px - 28, py - 20);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(px, py - 70);
      ctx.lineTo(px + 22, py - 30);
      ctx.lineTo(px - 22, py - 30);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(px - 22, py - 24, 44, 4);
    } else if (d.kind === "rock") {
      ctx.fillStyle = "#3a1a06";
      ctx.beginPath(); ctx.arc(px, py - 14, 22, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#7a3a1a";
      ctx.beginPath(); ctx.arc(px - 4, py - 18, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff7a3c";
      ctx.fillRect(px - 16, py - 4, 32, 4); // dung nham
    } else if (d.kind === "cloud") {
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.beginPath(); ctx.arc(px, py - 30, 18, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + 16, py - 26, 14, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px - 16, py - 22, 12, 0, Math.PI * 2); ctx.fill();
    }
  }
}

const camera = { x: 0, y: 0, tx: 0, ty: 0 };
function updateCamera(player, level) {
  camera.tx = player.x + player.w / 2 - W / 2;
  camera.ty = player.y + player.h / 2 - H / 2 - 60;
  camera.tx = clamp(camera.tx, 0, level.width - W);
  camera.ty = clamp(camera.ty, -120, 200);
  // camera đuổi mượt
  camera.x += (camera.tx - camera.x) * 0.12;
  camera.y += (camera.ty - camera.y) * 0.12;
}

const input = {
  left: false, right: false, up: false, down: false,
  jump: false, mouseDown: false, mouseX: 0, mouseY: 0
};
window.addEventListener("keydown", e => {
  // Khi đang nhập tên: bắt mọi phím chữ/số/khoảng trắng
  if (typeof gameState !== "undefined" && gameState === STATE.NAME_INPUT) {
    if (e.code === "Backspace") {
      typedName = typedName.slice(0, -1);
      e.preventDefault();
      return;
    }
    if (e.code === "Enter") {
      input.enter = true;
      e.preventDefault();
      return;
    }
    if (e.code === "Escape") { input.esc = true; return; }
    // chấp nhận chữ La-tinh, số, khoảng trắng và ký tự tiếng Việt có dấu
    if (e.key && e.key.length === 1 && typedName.length < 14) {
      if (/[A-Za-z0-9 _\-]/.test(e.key) ||
          /[À-ɏḀ-ỿ]/.test(e.key)) {
        typedName += e.key;
      }
    }
    return;   // chặn không cho phím game chạy lúc đang gõ tên
  }
  if (e.code === "ArrowLeft")  input.left = true;
  if (e.code === "ArrowRight") input.right = true;
  if (e.code === "ArrowUp")    input.up = true;
  if (e.code === "ArrowDown")  input.down = true;
  if (e.code === "Space")      { input.jump = true; e.preventDefault(); }
  if (e.code === "Enter")      input.enter = true;
  if (e.code === "Escape")     input.esc = true;
  if (e.code === "KeyE")       input.shopKey = true;
  // Xuất/Nhập bảng xếp hạng - chỉ ở màn hình Tiêu đề để khỏi nhầm
  if (gameState === STATE.TITLE) {
    if (e.code === "KeyB") exportLeaderboard();
    if (e.code === "KeyL") importLeaderboard();
  }
  // Phím 1-6: chuyển sang sức mạnh tương ứng (chỉ nếu đã sở hữu)
  if (e.code && e.code.startsWith("Digit")) {
    const n = parseInt(e.code.slice(5), 10);
    if (n >= 1 && n <= POWER_ORDER.length && player) {
      const target = POWER_ORDER[n - 1];
      if (player.inventory.includes(target) && player.power !== target) {
        player.power = target;
        showNotice("Sức mạnh: " + POWERS[target].name, 80);
        sfxCoin();
      }
    }
  }
  // Phím Q: xoay vòng qua các sức mạnh đang có
  if (e.code === "KeyQ" && player && player.inventory.length > 1) {
    const cur  = player.inventory.indexOf(player.power);
    const next = (cur + 1) % player.inventory.length;
    player.power = player.inventory[next];
    showNotice("Sức mạnh: " + POWERS[player.power].name, 80);
    sfxCoin();
  }
});
window.addEventListener("keyup", e => {
  if (e.code === "ArrowLeft")  input.left = false;
  if (e.code === "ArrowRight") input.right = false;
  if (e.code === "ArrowUp")    input.up = false;
  if (e.code === "ArrowDown")  input.down = false;
  if (e.code === "Space")      input.jump = false;
  if (e.code === "Enter")      input.enter = false;
  if (e.code === "Escape")     input.esc = false;
  if (e.code === "KeyE")       input.shopKey = false;
});

// Bố cục lưới cửa hàng (lưu rect mỗi mục để bắt click)
const SHOP_LAYOUT = {
  panelX: 60, panelY: 60, panelW: 1160, panelH: 600,
  cardW: 360, cardH: 124, cols: 3, gap: 14,
  startX: 80, startY: 160
};
function shopCardRect(idx) {
  const L = SHOP_LAYOUT;
  const col = idx % L.cols, row = Math.floor(idx / L.cols);
  return {
    x: L.startX + col * (L.cardW + L.gap),
    y: L.startY + row * (L.cardH + L.gap),
    w: L.cardW, h: L.cardH
  };
}

// Mua một mặt hàng
function buyShopItem(item) {
  // Đã sở hữu trái này -> bấm là đổi miễn phí (không tốn vàng)
  if (item.kind === "fruit" && player.inventory.includes(item.fruit)) {
    if (player.power === item.fruit) {
      showNotice("Bạn đang dùng " + item.name + " rồi!", 90);
      return;
    }
    player.power = item.fruit;
    showNotice("Đã đổi sang " + item.name + " (miễn phí)!", 120);
    sfxCoin();
    return;
  }
  if (player.gold < item.price) {
    showNotice("Không đủ vàng để mua " + item.name + "!", 90);
    sfxHurt();
    return;
  }
  if (item.kind === "sword" && player.swordTier >= item.tier) {
    showNotice("Bạn đã có kiếm bằng hoặc tốt hơn rồi!", 90);
    sfxHurt();
    return;
  }
  player.gold -= item.price;
  if (item.kind === "heal")       player.hp = Math.min(player.maxHp, player.hp + 30);
  else if (item.kind === "heal_full") player.hp = player.maxHp;
  else if (item.kind === "max_hp") { player.maxHp += 20; player.hp += 20; }
  else if (item.kind === "life")   player.lives += 1;
  else if (item.kind === "fruit") {
    player.acquireFruit(item.fruit);
    showNotice("Đã mua " + item.name + "! Bấm 1-6 để đổi qua lại.", 180);
  }
  else if (item.kind === "sword") {
    player.swordTier = item.tier;
    showNotice("Bạn vừa nhận " + item.name + "!", 150);
  }
  sfxCoin();
  spawnParticles(player.x + player.w/2, player.y + player.h/2, {
    count: 18, color: "#fff5a0", speed: 4, size: 3, life: 30, shape: "star"
  });
}
let gameState = STATE.TITLE;
let currentIslandIdx = 0;
let level = null;
let player = null;
let quests = [];
let playerOrbs = [];   // đạn của người chơi
let enemyOrbs = [];    // đạn của boss
let questFlash = 0;    // hiệu ứng nhấp nháy khi nhận / hoàn thành nhiệm vụ
let questNotice = "";  // chữ thông báo nhiệm vụ ở giữa màn hình
let noticeTimer = 0;
let mouseClickConsumed = false;

function startGame() {
  ensureAudio();              // tạo AudioContext sau khi user nhấn phím
  currentIslandIdx = 0;
  player = new Player(100, 400);
  player.name = (typedName.trim() || "Hải Tặc").slice(0, 14);
  scoreSavedThisRound = false;
  lastSavedEntry = null;
  loadIsland(0);
  gameState = STATE.PLAYING;
  startBGM();
}

function loadIsland(idx) {
  level = buildIsland(idx);
  quests = makeQuestState(idx);
  player.x = level.spawnX;
  player.y = level.spawnY;
  player.vx = 0; player.vy = 0;
  player.hp = player.maxHp;
  playerOrbs.length = 0;
  enemyOrbs.length = 0;
  particles.length = 0;
  showNotice("Chào mừng đến " + level.name + "! Đến gặp người dân (chấm than vàng) để nhận nhiệm vụ.");
}

function showNotice(msg, time = 240) {
  questNotice = msg;
  noticeTimer = time;
}

// ===========================================================================
// 17) VÒNG LẶP CHÍNH -------------------------------------------------------
// ===========================================================================
function update() {
  if (gameState === STATE.PLAYING) {
    player.update(input, level);

    // Nhân vật chính bắn đạn ma thuật khi click chuột
    if (input.mouseDown && !mouseClickConsumed && player.attackCooldown <= 0) {
      const tx = input.mouseX + camera.x;
      const ty = input.mouseY + camera.y;
      const cfg = POWERS[player.power] || POWERS.default;
      const ox = player.x + player.w/2 - cfg.size/2;
      const oy = player.y + player.h/2 - cfg.size/2;
      let dx = tx - (player.x + player.w/2);
      let dy = ty - (player.y + player.h/2);
      const baseAng = Math.atan2(dy, dx);
      // Bắn count đạn lệch theo spread
      const n = cfg.count || 1;
      const swordMul = player.swordMultiplier();
      for (let i = 0; i < n; i++) {
        const offset = (n === 1) ? 0 : ((i - (n - 1) / 2) * cfg.spread);
        const a = baseAng + offset;
        const orb = new MagicOrb(
          ox, oy,
          Math.cos(a), Math.sin(a),
          "player", cfg
        );
        orb.dmg = cfg.dmg * swordMul;     // kiếm tăng sát thương
        playerOrbs.push(orb);
      }
      player.attackCooldown = cfg.cd;
      sfxShoot();
      // hiệu ứng phép thuật quanh người
      spawnParticles(player.x + player.w/2, player.y + player.h/2, {
        count: 8, color: cfg.glow, speed: 3, size: 3, life: 18, gravity: 0
      });
      mouseClickConsumed = true;
    }
    if (!input.mouseDown) mouseClickConsumed = false;

    // Cập nhật kẻ thù
    for (const e of level.enemies) e.update(level, player);
    // Vật phẩm
    const beforeCoins  = level.items.filter(i => i.kind === "coin"  && i.alive).length;
    const beforeFruits = level.items.filter(i => i.kind === "fruit" && i.alive).length;
    for (const it of level.items) it.update(player);
    const afterCoins   = level.items.filter(i => i.kind === "coin"  && i.alive).length;
    const afterFruits  = level.items.filter(i => i.kind === "fruit" && i.alive).length;
    for (let k = 0; k < beforeCoins  - afterCoins;  k++) updateQuests(quests, "collect_coin");
    for (let k = 0; k < beforeFruits - afterFruits; k++) updateQuests(quests, "collect_fruit");

    // NPC
    for (const n of level.npcs) n.update();
    // Thuyền
    for (const b of level.boats) b.update();

    // Đạn của người chơi
    for (let i = playerOrbs.length - 1; i >= 0; i--) {
      const o = playerOrbs[i];
      o.update();
      let hit = false;
      for (const e of level.enemies) {
        if (e.alive && rectsHit(o, e)) {
          e.takeDamage(o.dmg);
          if (e.alive) sfxHitEnemy();   // còn sống -> tiếng "trúng đòn"; chết thì sfxKillEnemy ở vòng quét sau
          hit = true;
          break;
        }
      }
      if (hit || o.life <= 0) playerOrbs.splice(i, 1);
    }

    // Quét tất cả kẻ thù: nếu vừa chết (do đạn hoặc rơi biển) mà chưa thưởng -> thưởng và đếm nhiệm vụ
    for (const e of level.enemies) {
      if (!e.alive && !e.rewarded) {
        e.rewarded = true;
        player.score += e.scoreReward;
        player.gold  += e.goldReward;
        sfxKillEnemy();
        if (e.kind === "guard")      updateQuests(quests, "kill_guard");
        else if (e.kind === "beast") updateQuests(quests, "kill_beast");
        else if (e.kind === "boss")  updateQuests(quests, "kill_boss");
      }
    }

    // Đạn của boss
    for (let i = enemyOrbs.length - 1; i >= 0; i--) {
      const o = enemyOrbs[i];
      o.update();
      if (rectsHit(o, player)) {
        player.takeDamage(o.dmg);
        enemyOrbs.splice(i, 1);
        continue;
      }
      if (o.life <= 0) enemyOrbs.splice(i, 1);
    }

    // Mở bảng nhiệm vụ khi gần NPC và bấm Enter
    for (const n of level.npcs) {
      if (n.inRange(player) && input.enter) {
        gameState = STATE.QUEST;
        input.enter = false;
        break;
      }
    }

    // Bấm E để mở cửa hàng (mua bằng vàng)
    if (input.shopKey) {
      gameState = STATE.SHOP;
      input.shopKey = false;
      mouseClickConsumed = true;   // tránh bắn tiếp khi mở shop
    }

    // Đến thuyền và đã hoàn thành tất cả nhiệm vụ -> qua đảo mới
    for (const b of level.boats) {
      if (b.inRange(player) && allQuestsDone(quests)) {
        if (currentIslandIdx === ISLAND_CONFIGS.length - 1) {
          gameState = STATE.WIN;
          stopBGM();
          sfxWin();
          commitScore(true);
        } else {
          currentIslandIdx++;
          loadIsland(currentIslandIdx);
          player.score += 1000;
          sfxWin();
        }
        break;
      } else if (b.inRange(player) && !allQuestsDone(quests)) {
        showNotice("Hãy hoàn thành tất cả nhiệm vụ trước khi lên thuyền!", 90);
      }
    }

    // Thua game
    if (player.dead) {
      gameState = STATE.GAMEOVER;
      stopBGM();
      sfxGameOver();
      commitScore(false);
    }

    updateParticles();
    updateCamera(player, level);

    if (noticeTimer > 0) noticeTimer--;
  } else if (gameState === STATE.QUEST) {
    if (input.enter || input.esc) {
      gameState = STATE.PLAYING;
      input.enter = false;
      input.esc = false;
    }
  } else if (gameState === STATE.SHOP) {
    // Đóng cửa hàng bằng E hoặc ESC
    if (input.shopKey || input.esc) {
      gameState = STATE.PLAYING;
      input.shopKey = false;
      input.esc = false;
      mouseClickConsumed = true;
    }
    // Bắt click chuột vào card để mua
    if (input.mouseDown && !mouseClickConsumed) {
      mouseClickConsumed = true;
      for (let i = 0; i < SHOP_ITEMS.length; i++) {
        const r = shopCardRect(i);
        if (input.mouseX >= r.x && input.mouseX <= r.x + r.w &&
            input.mouseY >= r.y && input.mouseY <= r.y + r.h) {
          buyShopItem(SHOP_ITEMS[i]);
          break;
        }
      }
    }
    if (!input.mouseDown) mouseClickConsumed = false;
    // vẫn cập nhật hạt + thông báo cho không bị đứng hình
    updateParticles();
    if (noticeTimer > 0) noticeTimer--;
  } else if (gameState === STATE.TITLE) {
    if (input.enter) {
      input.enter = false;
      // Bắt đầu nhập tên
      ensureAudio();
      typedName = (player && player.name && player.name !== "Hải Tặc") ? player.name : "";
      gameState = STATE.NAME_INPUT;
    }
  } else if (gameState === STATE.NAME_INPUT) {
    if (input.esc) {
      input.esc = false;
      gameState = STATE.TITLE;
    }
    if (input.enter) {
      input.enter = false;
      if (typedName.trim().length === 0) {
        showNotice("Vui lòng nhập tên hải tặc của bạn!", 90);
      } else {
        startGame();
      }
    }
    if (noticeTimer > 0) noticeTimer--;
  } else if (gameState === STATE.GAMEOVER || gameState === STATE.WIN) {
    if (input.enter) {
      input.enter = false;
      gameState = STATE.TITLE;
    }
  }
}

// Lưu điểm hiện tại của người chơi vào bảng xếp hạng (chỉ 1 lần / lượt)
function commitScore(won) {
  if (scoreSavedThisRound) return;
  scoreSavedThisRound = true;
  const islandsCleared = won ? ISLAND_CONFIGS.length : currentIslandIdx;
  const result = addScoreToLeaderboard(player.name, player.score, islandsCleared, won);
  lastSavedEntry = result.entry;
}

// ===========================================================================
// 18) HÀM VẼ ---------------------------------------------------------------
// ===========================================================================
function draw() {
  // xoá nền
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  if (gameState === STATE.TITLE) {
    drawTitleScreen();
    return;
  }
  if (gameState === STATE.NAME_INPUT) {
    drawNameInput();
    return;
  }

  // === Đang chơi / mở bảng nhiệm vụ (vẽ thế giới phía sau) ===
  drawBackground(level, camera.x);
  drawDecorations(level, camera.x, camera.y);
  drawPlatforms(level, camera.x, camera.y);

  // Thuyền cuối đảo
  for (const b of level.boats) b.draw(camera.x, camera.y);
  // NPC
  for (const n of level.npcs) n.draw(camera.x, camera.y);
  // Vật phẩm
  for (const it of level.items) it.draw(camera.x, camera.y);
  // Kẻ thù
  for (const e of level.enemies) e.draw(camera.x, camera.y);
  // Đạn của người chơi
  for (const o of playerOrbs) o.draw(camera.x, camera.y);
  // Đạn của boss
  for (const o of enemyOrbs)  o.draw(camera.x, camera.y);
  // Người chơi
  player.draw(camera.x, camera.y);
  // Hạt
  drawParticles(camera.x, camera.y);

  // Vẽ ngắm chuột
  drawCrosshair();

  // Vẽ UI
  drawPowerBar();
  drawHUD();

  // Thông báo gần NPC
  for (const n of level.npcs) {
    if (n.inRange(player)) {
      const tx = n.x - camera.x + n.w/2;
      const ty = n.y - camera.y - 40;
      drawText("[Enter] Nhận nhiệm vụ", tx, ty, 18, "#fff", "#000", "center");
    }
  }
  // Thông báo gần thuyền
  for (const b of level.boats) {
    if (b.inRange(player)) {
      const tx = b.x - camera.x + b.w/2;
      const ty = b.y - camera.y - 60;
      if (allQuestsDone(quests)) {
        drawText("Lên thuyền sang đảo mới!", tx, ty, 18, "#7afc6e", "#000", "center");
      } else {
        drawText("Cần hoàn thành nhiệm vụ", tx, ty, 18, "#ffd24a", "#000", "center");
      }
    }
  }

  // Thông báo lớn giữa màn hình - đặt dưới boss bar và rộng theo nội dung
  if (noticeTimer > 0 && questNotice) {
    ctx.globalAlpha = Math.min(1, noticeTimer / 30);
    let ns = 22;
    ctx.font = `bold ${ns}px sans-serif`;
    let tw = ctx.measureText(questNotice).width;
    // nếu quá rộng, giảm cỡ chữ
    while (tw > W - 120 && ns > 14) {
      ns--;
      ctx.font = `bold ${ns}px sans-serif`;
      tw = ctx.measureText(questNotice).width;
    }
    const padX = 30, padY = 18;
    const boxW = Math.min(W - 60, tw + padX * 2);
    const boxH = ns + padY * 2;
    const noticeY = 380;
    // pill phẳng, vạch nhấn vàng dưới đáy
    ctx.fillStyle = "rgba(14, 22, 48, 0.92)";
    ctx.fillRect(W/2 - boxW/2, noticeY, boxW, boxH);
    ctx.fillStyle = "#ffd24a";
    ctx.fillRect(W/2 - boxW/2, noticeY + boxH - 3, boxW, 3);
    drawText(questNotice, W/2, noticeY + padY, ns, "#fff", "#000", "center");
    ctx.globalAlpha = 1;
  }

  if (gameState === STATE.QUEST)    drawQuestPanel();
  if (gameState === STATE.SHOP)     drawShop();
  if (gameState === STATE.GAMEOVER) drawGameOver();
  if (gameState === STATE.WIN)      drawWin();
}

// =====================================================================
// Vẽ icon trong cửa hàng tuỳ theo loại mặt hàng
// =====================================================================
function drawShopIcon(item, cx, cy) {
  if (item.kind === "heal" || item.kind === "heal_full") {
    // bình thuốc đỏ
    ctx.fillStyle = "#5a2a06";
    ctx.fillRect(cx - 8, cy - 18, 16, 6);          // nắp
    ctx.fillStyle = "#7a3a06";
    ctx.fillRect(cx - 4, cy - 22, 8, 6);
    ctx.fillStyle = item.kind === "heal_full" ? "#ff1a1a" : "#ff6a6a";
    ctx.fillRect(cx - 12, cy - 12, 24, 28);
    ctx.fillStyle = "#fff";
    ctx.fillRect(cx - 8, cy - 8, 4, 6);            // điểm sáng
    drawText("+", cx, cy + 2, 16, "#fff", "#000", "center");
  } else if (item.kind === "max_hp") {
    // trái tim lớn
    ctx.fillStyle = "#ff4a6a";
    ctx.beginPath();
    ctx.arc(cx - 6, cy - 4, 9, 0, Math.PI * 2);
    ctx.arc(cx + 6, cy - 4, 9, 0, Math.PI * 2);
    ctx.moveTo(cx - 14, cy);
    ctx.lineTo(cx, cy + 18);
    ctx.lineTo(cx + 14, cy);
    ctx.fill();
    drawText("+", cx, cy - 8, 14, "#fff", "#000", "center");
  } else if (item.kind === "life") {
    // chữ 1UP kiểu game
    ctx.fillStyle = "#7afc6e";
    ctx.fillRect(cx - 22, cy - 14, 44, 28);
    drawText("1UP", cx, cy - 8, 16, "#fff", "#000", "center");
  } else if (item.kind === "fruit") {
    const cfg = POWERS[item.fruit];
    // dùng màu của power
    ctx.fillStyle = "#3a8a2a";
    ctx.fillRect(cx - 2, cy - 24, 4, 8);           // cuống
    ctx.fillStyle = cfg.glow;
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = cfg.color;
    ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillRect(cx - 6, cy - 8, 4, 4);
  } else if (item.kind === "sword") {
    // kiếm với màu khác nhau theo cấp
    const colors = [null,
      ["#cc7a1a", "#8a4a06"],   // đồng
      ["#dde0e6", "#9aa0aa"],   // bạc
      ["#ffd24a", "#a87a14"]];  // vàng
    const [c1, c2] = colors[item.tier];
    // chuôi
    ctx.fillStyle = "#3a1a06"; ctx.fillRect(cx - 3, cy + 6, 6, 14);
    ctx.fillStyle = c2;        ctx.fillRect(cx - 12, cy + 4, 24, 4);
    // lưỡi kiếm
    ctx.fillStyle = c1;        ctx.fillRect(cx - 2, cy - 22, 4, 28);
    ctx.fillStyle = "#fff";    ctx.fillRect(cx - 1, cy - 22, 1, 22);
    ctx.fillStyle = c2;        ctx.fillRect(cx - 2, cy - 24, 4, 4);
  }
}

// =====================================================================
// Vẽ cửa hàng (mở khi bấm E)
// =====================================================================
function drawShop() {
  // backdrop làm mờ thế giới phía sau
  ctx.fillStyle = "rgba(8, 14, 30, 0.82)";
  ctx.fillRect(0, 0, W, H);

  const L = SHOP_LAYOUT;
  // panel chính - nền phẳng, chỉ một vạch nhấn vàng ở đỉnh
  ctx.fillStyle = "#141d3a";
  ctx.fillRect(L.panelX, L.panelY, L.panelW, L.panelH);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(L.panelX, L.panelY, L.panelW, 4);

  // tiêu đề
  drawText("CỬA HÀNG HẢI TẶC",
    L.panelX + L.panelW/2, L.panelY + 24, 30, "#ffd24a", "#000", "center");
  drawText("Vàng của bạn: " + player.gold,
    L.panelX + 30, L.panelY + 78, 20, "#ffe18a", "#000", "left");
  drawText("Bấm E hoặc ESC để đóng",
    L.panelX + L.panelW - 30, L.panelY + 80, 16, "#8ea6c8", "#000", "right");

  // các thẻ hàng
  for (let i = 0; i < SHOP_ITEMS.length; i++) {
    const it = SHOP_ITEMS[i];
    const r  = shopCardRect(i);

    const enough     = player.gold >= it.price;
    const ownedFruit = it.kind === "fruit" && player.inventory.includes(it.fruit);
    const activeFruit= it.kind === "fruit" && player.power === it.fruit;
    const ownedSword = it.kind === "sword" && player.swordTier >= it.tier;

    // hover (chuột nằm trong)
    const hover = (input.mouseX >= r.x && input.mouseX <= r.x + r.w &&
                   input.mouseY >= r.y && input.mouseY <= r.y + r.h);

    // nền card phẳng - không viền, chỉ một vạch màu mỏng phía trái để báo trạng thái
    let bgCol  = "#1c264a";
    let accent = "#3a4a78";
    if (activeFruit)      { bgCol = "#1f3a2a"; accent = "#5dd968"; }
    else if (ownedFruit)  { bgCol = "#1c3548"; accent = "#5dccff"; }
    else if (ownedSword)  { bgCol = "#1f3a2a"; accent = "#5dd968"; }
    else if (!enough)     { accent = "#3a3a3a"; }
    if (hover && !activeFruit) {
      bgCol  = ownedFruit ? "#1f4258" : "#22305c";
      accent = ownedFruit ? "#7ad4ff" : "#ffd24a";
    }

    ctx.fillStyle = bgCol;
    ctx.fillRect(r.x, r.y, r.w, r.h);
    // vạch nhấn 4px bên trái
    ctx.fillStyle = accent;
    ctx.fillRect(r.x, r.y, 4, r.h);

    // icon
    drawShopIcon(it, r.x + 50, r.y + r.h/2);

    // tên + mô tả (tự co cỡ chữ nếu quá dài để khỏi tràn ra ngoài thẻ)
    const textMaxW = r.w - 120;          // chừa chỗ cho icon trái + giá phải
    let nameSize = 20;
    ctx.font = `bold ${nameSize}px sans-serif`;
    while (ctx.measureText(it.name).width > textMaxW && nameSize > 14) {
      nameSize--;
      ctx.font = `bold ${nameSize}px sans-serif`;
    }
    drawText(it.name, r.x + 100, r.y + 12, nameSize, "#ffd24a", "#000");
    let descSize = 13;
    ctx.font = `bold ${descSize}px sans-serif`;
    let desc = it.desc;
    while (ctx.measureText(desc).width > textMaxW && desc.length > 6) {
      desc = desc.slice(0, -1);
    }
    if (desc !== it.desc) desc = desc.slice(0, -1) + "…";
    drawText(desc, r.x + 100, r.y + 40, descSize, "#fff", "#000");

    // dòng trạng thái + giá
    if (activeFruit) {
      drawText("ĐANG DÙNG", r.x + r.w - 14, r.y + r.h - 32, 18, "#7afc6e", "#000", "right");
    } else if (ownedFruit) {
      drawText("Bấm để đổi (miễn phí)", r.x + 100, r.y + r.h - 26, 13, "#7ad4ff", "#000");
      drawText("ĐÃ CÓ", r.x + r.w - 14, r.y + r.h - 32, 16, "#7ad4ff", "#000", "right");
    } else if (ownedSword) {
      drawText("ĐÃ CÓ", r.x + r.w - 14, r.y + r.h - 32, 18, "#7afc6e", "#000", "right");
    } else {
      const priceCol = enough ? "#fff5a0" : "#ff6a6a";
      drawText(it.price + " 💰", r.x + r.w - 14, r.y + r.h - 32, 20, priceCol, "#000", "right");
      drawText(enough ? "[Bấm để mua]" : "[Thiếu vàng]",
               r.x + 100, r.y + r.h - 26, 13, enough ? "#7afc6e" : "#ff6a6a", "#000");
    }
  }

  // thông báo nổi (nếu có)
  if (noticeTimer > 0 && questNotice) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(W/2 - 360, L.panelY + L.panelH - 56, 720, 44);
    drawText(questNotice, W/2, L.panelY + L.panelH - 48, 20, "#fff", "#000", "center");
  }
}

function drawCrosshair() {
  const x = input.mouseX, y = input.mouseY;
  ctx.strokeStyle = "rgba(255,255,255,0.8)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 18, y); ctx.lineTo(x - 6, y);
  ctx.moveTo(x + 6, y);  ctx.lineTo(x + 18, y);
  ctx.moveTo(x, y - 18); ctx.lineTo(x, y - 6);
  ctx.moveTo(x, y + 6);  ctx.lineTo(x, y + 18);
  ctx.stroke();
}

// =====================================================================
// Thanh sức mạnh ở giữa trên cùng - 6 ô tương ứng phím 1..6
// Ô đang dùng tô vàng, ô đã sở hữu tô bình thường, ô chưa có thì xám/khoá
// =====================================================================
function drawPowerBar() {
  const slots = POWER_ORDER;        // 6 mặt
  const sw = 70, sh = 64, pad = 6;
  const total = slots.length * sw + (slots.length - 1) * pad;
  const startX = (W - total) / 2;   // ở giữa, nằm khoảng x=395..885
  const y = 14;

  for (let i = 0; i < slots.length; i++) {
    const power  = slots[i];
    const cfg    = POWERS[power];
    const owned  = player.inventory.includes(power);
    const active = player.power === power;
    const x = startX + i * (sw + pad);

    // Slot phẳng: nền màu khác nhau theo trạng thái + vạch nhấn dưới đáy nếu active
    ctx.fillStyle = active ? "rgba(255, 210, 74, 0.18)"
                  : owned  ? "rgba(14, 22, 48, 0.78)"
                           : "rgba(14, 22, 48, 0.42)";
    ctx.fillRect(x, y, sw, sh);
    if (active) {
      ctx.fillStyle = "#ffd24a";
      ctx.fillRect(x, y + sh - 3, sw, 3);  // vạch vàng dưới đáy = đang dùng
    }

    drawText((i + 1) + "",
             x + sw/2, y + 4, 12,
             active ? "#ffd24a" : (owned ? "#dbe6f5" : "#5a6680"),
             "#000", "center");

    if (owned) {
      // icon vòng tròn theo màu power
      ctx.fillStyle = cfg.glow;
      ctx.beginPath(); ctx.arc(x + sw/2, y + 30, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = cfg.color;
      ctx.beginPath(); ctx.arc(x + sw/2, y + 30, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.fillRect(x + sw/2 - 4, y + 26, 3, 3);
    } else {
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(x + sw/2 - 8, y + 22, 16, 16);
      drawText("?", x + sw/2, y + 22, 18, "#666", "#000", "center");
    }

    // tên nhỏ ở đáy ô (cắt gọn)
    let name = cfg.name;
    ctx.font = "bold 11px sans-serif";
    while (ctx.measureText(name).width > sw - 6 && name.length > 4) {
      name = name.slice(0, -1);
    }
    drawText(name, x + sw/2, y + sh - 14, 11,
             owned ? (active ? "#ffd24a" : "#fff") : "#666", "#000", "center");
  }

  // gợi ý phím nhỏ
  drawText("1-6 hoặc Q : đổi sức mạnh",
           W/2, y + sh + 4, 12, "#aef", "#000", "center");
}

// HUD (góc trên bên phải): điểm, máu, mạng, vàng, sức mạnh, đảo, nhiệm vụ
function drawHUD() {
  // Panel phẳng, không viền, vạch nhấn vàng mỏng ở đỉnh
  const panelX = W - 360, panelY = 20, panelW = 340, panelH = 350;
  ctx.fillStyle = "rgba(14, 22, 48, 0.82)";
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(panelX, panelY, panelW, 3);

  // Tên đảo - co chữ lại nếu quá dài
  let nameSize = 20;
  ctx.font = `bold ${nameSize}px sans-serif`;
  while (ctx.measureText(level.name).width > panelW - 24 && nameSize > 14) {
    nameSize--;
    ctx.font = `bold ${nameSize}px sans-serif`;
  }
  drawText(level.name, panelX + panelW/2, panelY + 12, nameSize, "#ffe18a", "#000", "center");

  // Tên người chơi (góc trên trái màn hình) - phẳng, không viền
  ctx.fillStyle = "rgba(14, 22, 48, 0.80)";
  ctx.fillRect(20, 20, 220, 30);
  ctx.fillStyle = "#5dccff";
  ctx.fillRect(20, 20, 3, 30);
  drawText(player.name, 32, 28, 17, "#dbe6f5", "#000");

  // Máu - thanh không viền
  const hpRatio = clamp(player.hp / player.maxHp, 0, 1);
  drawText("Máu", panelX + 14, panelY + 46, 14, "#a8b6cc");
  const barX = panelX + 60, barW = panelW - 76, barH = 16;
  ctx.fillStyle = "rgba(255, 90, 90, 0.18)";
  ctx.fillRect(barX, panelY + 46, barW, barH);
  ctx.fillStyle = "#ff5a5a";
  ctx.fillRect(barX, panelY + 46, barW * hpRatio, barH);
  drawText(`${Math.max(0, Math.floor(player.hp))}/${player.maxHp}`,
           barX + barW/2, panelY + 47, 13, "#fff", "#000", "center");

  // Mạng (trái tim) - không có ô viền cho trái tim mất, dùng heart mờ thay
  drawText("Mạng", panelX + 14, panelY + 76, 14, "#a8b6cc");
  const livesShown = Math.max(3, player.lives);
  for (let i = 0; i < livesShown; i++) {
    const hx = panelX + 66 + i * 28, hy = panelY + 80;
    const filled = i < player.lives;
    ctx.fillStyle = filled ? "#ff5a76" : "rgba(255, 90, 118, 0.15)";
    ctx.beginPath();
    ctx.arc(hx + 4,  hy + 4, 6, 0, Math.PI * 2);
    ctx.arc(hx + 14, hy + 4, 6, 0, Math.PI * 2);
    ctx.moveTo(hx, hy + 6);
    ctx.lineTo(hx + 9, hy + 18);
    ctx.lineTo(hx + 18, hy + 6);
    ctx.fill();
  }

  // Điểm
  drawText("Điểm: " + player.score, panelX + 14, panelY + 110, 17, "#ffd24a", "#000");
  // Vàng
  drawText("Vàng: " + player.gold,  panelX + 14, panelY + 132, 17, "#fff5a0", "#000");

  // Sức mạnh hiện tại - hiển thị icon vòng tròn + tên
  const pcfg = POWERS[player.power] || POWERS.default;
  drawText("Sức mạnh:", panelX + 14, panelY + 156, 15, "#aef", "#000");
  // icon
  const icx = panelX + 110, icy = panelY + 165;
  ctx.fillStyle = pcfg.glow;
  ctx.beginPath(); ctx.arc(icx, icy, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = pcfg.color;
  ctx.beginPath(); ctx.arc(icx, icy, 6, 0, Math.PI * 2); ctx.fill();
  drawText(pcfg.name, panelX + 124, panelY + 156, 15, pcfg.color, "#000");

  // Kiếm hiện tại
  const swordNames = ["(chưa có)", "Kiếm Đồng", "Kiếm Bạc", "Kiếm Vàng"];
  const swordCols  = ["#888",       "#cc7a1a",   "#dde0e6",  "#ffd24a"];
  drawText("Kiếm:",
           panelX + 14, panelY + 182, 15, "#aef", "#000");
  drawText(swordNames[player.swordTier] +
           (player.swordTier > 0 ? `  (×${player.swordMultiplier()})` : ""),
           panelX + 64, panelY + 182, 15, swordCols[player.swordTier], "#000");

  // Tiến độ nhiệm vụ
  let qy = panelY + 214;
  drawText("Nhiệm vụ:", panelX + 14, qy, 14, "#aef", "#000");
  qy += 20;
  for (const q of quests) {
    const sym = q.done ? "✓" : "•";
    const col = q.done ? "#7afc6e" : "#fff";
    // chỉ hiển thị tóm tắt + tiến độ để khỏi tràn
    let label = q.text;
    // co chữ tự động cho khớp panel
    let s = 13;
    ctx.font = `bold ${s}px sans-serif`;
    const maxW = panelW - 80;
    while (ctx.measureText(label).width > maxW && label.length > 6) {
      label = label.slice(0, -1);
    }
    if (label !== q.text) label = label.slice(0, -1) + "…";
    drawText(`${sym} ${label}`, panelX + 14, qy, s, col, "#000");
    drawText(`${q.progress}/${q.target}`,
             panelX + panelW - 14, qy, s, col, "#000", "right");
    qy += 18;
  }

  // Bảng máu boss - phẳng, không viền
  if (level.boss && level.boss.alive && level.boss.aggro) {
    const bx = W/2 - 260, by = 110;
    ctx.fillStyle = "rgba(14, 22, 48, 0.85)";
    ctx.fillRect(bx, by, 520, 44);
    ctx.fillStyle = "#ff5a5a";
    ctx.fillRect(bx, by, 520, 3);    // vạch nhấn đỏ ở đỉnh
    drawText("BOSS  ·  " + level.config.bossName,
             W/2, by + 8, 16, "#ff8a8a", "#000", "center");
    const r = clamp(level.boss.hp / level.boss.maxHp, 0, 1);
    ctx.fillStyle = "rgba(255, 90, 90, 0.18)"; ctx.fillRect(bx + 10, by + 26, 500, 12);
    ctx.fillStyle = "#ff3838";                 ctx.fillRect(bx + 10, by + 26, 500 * r, 12);
  }

  // Hướng dẫn ở góc dưới - phẳng, vạch nhấn vàng mỏng bên trái
  ctx.fillStyle = "rgba(14, 22, 48, 0.78)";
  ctx.fillRect(20, H - 110, 400, 90);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(20, H - 110, 3, 90);
  drawText("← → : Đi   ↑ / Cách : Nhảy",          32, H - 102, 15, "#dbe6f5");
  drawText("Chuột trái : Phép Khống Chế Từ Xa",   32, H -  82, 15, "#cba9ff");
  drawText("Enter : Bảng nhiệm vụ (gần NPC)",     32, H -  62, 15, "#5dd968");
  drawText("E : Cửa Hàng  ·  1-6 / Q : Đổi sức mạnh", 32, H -  42, 15, "#ffe18a");
}

// Bảng nhiệm vụ chi tiết
function drawQuestPanel() {
  ctx.fillStyle = "rgba(8, 14, 30, 0.82)";
  ctx.fillRect(0, 0, W, H);

  const px = W/2 - 360, py = 100, pw = 720, ph = 480;
  ctx.fillStyle = "#141d3a";
  ctx.fillRect(px, py, pw, ph);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(px, py, pw, 4);    // vạch nhấn đỉnh

  drawText("BẢNG NHIỆM VỤ  ·  " + level.name,
           px + pw/2, py + 24, 26, "#ffd24a", "#000", "center");

  drawText("Người dân: \"Chào hải tặc nhỏ! Hòn đảo của chúng tôi đang bị tấn công.",
           px + 30, py + 70, 16, "#fff");
  drawText("Bạn có thể giúp chúng tôi hoàn thành các nhiệm vụ sau không?\"",
           px + 30, py + 92, 16, "#fff");

  let qy = py + 140;
  for (let i = 0; i < quests.length; i++) {
    const q = quests[i];
    const col = q.done ? "#7afc6e" : "#fff";
    const sym = q.done ? "[ĐÃ XONG ✓]" : `[${q.progress}/${q.target}]`;
    drawText(`${i + 1}. ${q.text}`, px + 40, qy, 20, col, "#000");
    drawText(sym, px + pw - 40, qy, 20, col, "#000", "right");
    qy += 40;
  }

  drawText("Mẹo:", px + 30, qy + 20, 18, "#aef", "#000");
  drawText("• Dùng Chuột Trái để bắn đạn ma thuật từ xa.", px + 30, qy + 46, 16, "#fff");
  drawText("• Nhảy lên bục cao để tránh kẻ thù và tìm vàng.", px + 30, qy + 68, 16, "#fff");
  drawText("• Hoàn thành tất cả nhiệm vụ rồi lên thuyền sang đảo mới!", px + 30, qy + 90, 16, "#fff");

  drawText("Bấm Enter hoặc ESC để tiếp tục",
           px + pw/2, py + ph - 40, 18, "#ffd24a", "#000", "center");
}

// Màn hình tiêu đề
// Vẽ nền sao + sóng dùng chung cho title / nhập tên / kết thúc
function drawSpaceBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#1c2a8a");
  g.addColorStop(1, "#0a4a7a");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 80; i++) {
    const x = (i * 137) % W;
    const y = (i * 59) % (H/2);
    ctx.fillStyle = "rgba(255,255,255," + (0.5 + 0.5 * Math.sin(Date.now()/400 + i)) + ")";
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.fillStyle = "#0a4a7a";
  ctx.fillRect(0, H - 200, W, 200);
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  for (let i = 0; i < 30; i++) {
    ctx.fillRect((i * 50 + Math.floor(Date.now()/30) % 50), H - 180 + (i % 3) * 14, 26, 4);
  }
}

// =====================================================================
// Vẽ bảng xếp hạng (top 10). Nếu highlight = entry vừa ghi -> tô vàng
// =====================================================================
function drawLeaderboardPanel(x, y, w, h, highlight) {
  ctx.fillStyle = "rgba(14, 22, 48, 0.82)";
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(x, y, w, 3);    // vạch nhấn đỉnh, không viền 4 cạnh

  drawText("BẢNG XẾP HẠNG",
    x + w/2, y + 14, 24, "#ffd24a", "#000", "center");
  // chỉ báo trạng thái đồng bộ cloud
  const statusText  = cloudStatus === "online"  ? "● Đã kết nối Internet"
                    : cloudStatus === "loading" ? "○ Đang đồng bộ..."
                    : "× Mất kết nối (xem cache)";
  const statusColor = cloudStatus === "online"  ? "#7afc6e"
                    : cloudStatus === "loading" ? "#aef"
                    : "#ff8a8a";
  drawText(statusText, x + w/2, y + 38, 12, statusColor, "#000", "center");

  const list = loadLeaderboard();
  if (list.length === 0) {
    drawText("Chưa có ai chơi.",
      x + w/2, y + h/2 - 16, 22, "#ccc", "#000", "center");
    drawText("Hãy là hải tặc đầu tiên!",
      x + w/2, y + h/2 + 12, 18, "#aef", "#000", "center");
    return;
  }
  // hàng tiêu đề cột
  let ry = y + 56;
  drawText("#",     x + 24,        ry, 14, "#aef", "#000");
  drawText("Tên",   x + 60,        ry, 14, "#aef", "#000");
  drawText("Điểm",  x + w - 200,   ry, 14, "#aef", "#000");
  drawText("Đảo",   x + w - 110,   ry, 14, "#aef", "#000");
  drawText("Ngày",  x + w - 60,    ry, 14, "#aef", "#000");
  ry += 24;
  // các dòng
  const maxRows = Math.min(10, list.length);
  for (let i = 0; i < maxRows; i++) {
    const e = list[i];
    const isMe = highlight &&
                 highlight.name === e.name &&
                 highlight.score === e.score &&
                 highlight.date === e.date;
    if (isMe) {
      ctx.fillStyle = "rgba(255, 210, 74, 0.22)";
      ctx.fillRect(x + 8, ry - 3, w - 16, 24);
    }
    const col = isMe ? "#ffd24a" : (e.won ? "#7afc6e" : "#fff");
    drawText(`${i + 1}.`,        x + 24,      ry, 16, col, "#000");
    drawText(e.name,             x + 60,      ry, 16, col, "#000");
    drawText("" + e.score,       x + w - 200, ry, 16, col, "#000");
    drawText(e.won ? `${e.islands}⭐` : `${e.islands}`,
                                 x + w - 110, ry, 14, col, "#000");
    drawText(e.date,             x + w - 60,  ry, 12, col, "#000");
    ry += 22;
  }
}

// =====================================================================
// Màn hình tiêu đề - 2 cột: hướng dẫn + bảng xếp hạng
// =====================================================================

  drawText("↑ hoặc Cách : Nhảy lên",               bx + 30, by + 90,  19, "#fff");

  drawText("Enter : Nói chuyện / Mở nhiệm vụ",     bx + 30, by + 150, 19, "#7afc6e");
  drawText("E : Mở Cửa Hàng (mua bằng vàng)",      bx + 30, by + 180, 19, "#fff5a0");

  drawText("Mục tiêu:",                            bx + 30, by + 222, 19, "#aef");
  drawText("Khám phá 5 hòn đảo, đánh bại lính,",   bx + 30, by + 250, 17, "#fff");
  drawText("thú rừng và Boss để chiến thắng!",     bx + 30, by + 274, 17, "#fff");
  drawText("Vàng cao + thắng = top bảng xếp hạng", bx + 30, by + 312, 17, "#ffd24a");

           940, 590, 14, "#aef", "#000", "center");

  // nút bắt đầu nhấp nháy
  const blink = Math.floor(Date.now() / 500) % 2 === 0;

// =====================================================================
// Màn hình nhập tên hải tặc
// =====================================================================
function drawNameInput() {
  drawSpaceBackground();

  drawText("NHẬP TÊN HẢI TẶC", W/2, 130, 56, "#ffd24a", "#000", "center");
  drawText("Hãy đặt một cái tên thật ngầu!", W/2, 210, 22, "#fff", "#000", "center");

  // ô nhập - phẳng, gạch chân vàng đậm thay cho viền
  const bx = W/2 - 320, by = 280, bw = 640, bh = 90;
  ctx.fillStyle = "rgba(14, 22, 48, 0.78)";
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(bx, by + bh - 4, bw, 4);   // gạch chân = focus indicator
  // nội dung + con trỏ nhấp nháy
  const cursor = (Math.floor(Date.now() / 400) % 2 === 0) ? "▌" : " ";
  const display = typedName + cursor;
  drawText(display, W/2, by + 28, 38, "#fff", "#000", "center");

  drawText("Gõ chữ để nhập tên (tối đa 14 ký tự, có thể dùng tiếng Việt)",
           W/2, by + bh + 24, 18, "#aef", "#000", "center");
  drawText("Backspace để xoá ký tự",
           W/2, by + bh + 50, 18, "#aef", "#000", "center");

  if (typedName.trim().length > 0) {
    const blink = Math.floor(Date.now() / 500) % 2 === 0;
    drawText("► Bấm ENTER để bắt đầu ◄", W/2, H - 130, 30,
             blink ? "#7afc6e" : "#fff", "#000", "center");
  } else {
    drawText("(Cần nhập tên trước khi bắt đầu)",
             W/2, H - 130, 22, "#ff8a8a", "#000", "center");
  }
  drawText("ESC : Quay lại màn hình tiêu đề",
           W/2, H - 80, 18, "#aef", "#000", "center");

  // thông báo lỗi nếu có
  if (noticeTimer > 0 && questNotice) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(W/2 - 360, H - 200, 720, 40);
    drawText(questNotice, W/2, H - 192, 20, "#ff8a8a", "#000", "center");
  }
}

// Màn hình thua - kèm bảng xếp hạng
function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.85)";
  ctx.fillRect(0, 0, W, H);
  drawText("BẠN ĐÃ HẾT MẠNG!", W/2, 60,  60, "#ff4a4a", "#000", "center");
  drawText("Đừng buồn, hải tặc vĩ đại nào cũng từng thất bại!",
           W/2, 130, 22, "#fff", "#000", "center");
  drawText(`${player.name} - Điểm: ${player.score}`,
           W/2, 168, 26, "#ffd24a", "#000", "center");

  drawLeaderboardPanel(W/2 - 320, 210, 640, 420, lastSavedEntry);

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  drawText("Bấm ENTER để về Màn hình tiêu đề", W/2, H - 50, 24,
           blink ? "#7afc6e" : "#fff", "#000", "center");
}

// Màn hình thắng - kèm bảng xếp hạng
function drawWin() {
  if (Math.random() < 0.3) {
    spawnParticles(rand(100, W - 100), rand(100, H/2), {
      count: 20, color: choice(["#ff4a4a","#ffd24a","#4af0ff","#7afc6e","#ff8af0"]),
      speed: 5, size: 4, life: 50, gravity: 0.06
    });
  }
  ctx.fillStyle = "rgba(0, 30, 80, 0.88)";
  ctx.fillRect(0, 0, W, H);
  drawParticles(0, 0);
  updateParticles();

  drawText("CHIẾN THẮNG!", W/2, 50, 76, "#ffd24a", "#000", "center");
  drawText("Bạn đã chinh phục cả 5 hòn đảo!", W/2, 140, 26, "#fff", "#000", "center");
  drawText(`${player.name}  -  Điểm: ${player.score}  -  Vàng: ${player.gold}`,
           W/2, 178, 22, "#fff5a0", "#000", "center");

  drawLeaderboardPanel(W/2 - 320, 220, 640, 420, lastSavedEntry);

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  drawText("Bấm ENTER để về Màn hình tiêu đề", W/2, H - 50, 24,
           blink ? "#7afc6e" : "#fff", "#000", "center");
}

// ===========================================================================
// 19) VÒNG LẶP GAME --------------------------------------------------------
// ===========================================================================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
